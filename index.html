<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Women's Day ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ff758f,#ff7eb3);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
text-align:center;
color:white;
}

/* START AREA */

.start{
position:relative;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

.start h1{
font-size:clamp(32px,6vw,48px);
}

.start p{
font-size:18px;
max-width:400px;
opacity:.9;
}

.start button{
display:none;
padding:14px 32px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:16px;
cursor:pointer;
}

/* BALLOONS */

.balloon{
width:60px;
height:80px;
border-radius:50%;
position:absolute;
cursor:pointer;
animation:float 6s infinite ease-in-out;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:40px;
background:white;
top:80px;
left:50%;
}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-150px)}
100%{transform:translateY(0)}

}

/* SLIDE */

.container{
display:none;
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
color:#333;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
}

.message{
font-size:18px;
line-height:1.6;
margin-bottom:20px;
}

.nextBtn{
padding:12px 28px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- START PAGE -->

<div class="start" id="startPage">

<h1>Happy Women's Day 💐</h1>

<p>Pop the balloons to unlock your surprise 🎈</p>

<button id="startBtn" onclick="start()">Start Surprise ❤️</button>

</div>



<!-- SLIDES -->

<div class="container" id="slidePage">

<div class="card">

<img id="slideImg" src="Images/photo1.jpeg">

<p class="message" id="slideText">
Happy Women’s Day! Thanks for proving that women can do anything… including being dramatic for no reason. 😂
</p>

<button class="nextBtn" onclick="nextSlide()">Next Memory →</button>

</div>

</div>



<script>

const startPage=document.getElementById("startPage")
const startBtn=document.getElementById("startBtn")

let balloons=8

function createBalloons(){

for(let i=0;i<balloons;i++){

let b=document.createElement("div")

b.className="balloon"

b.style.background=randomColor()

b.style.left=Math.random()*90+"%"

b.style.top=Math.random()*80+"%"

b.onclick=function(){

this.remove()

balloons--

if(balloons==0){

startBtn.style.display="block"

}

}

startPage.appendChild(b)

}

}

function randomColor(){

let colors=["#ff4d6d","#ff758f","#ff8fa3","#ffb3c6","#cdb4db"]

return colors[Math.floor(Math.random()*colors.length)]

}

createBalloons()

/* SLIDES */

const slides=[

{
img:"Images/photo1.jpeg",
text:"Happy Women’s Day! Thanks for proving that women can do anything… including being dramatic for no reason. 😂"
},

{
img:"Images/photo2.jpeg",
text:"Happy Women’s Day to the girl who gets angry in 2 seconds but also cares the most. 💖😂"
},

{
img:"Images/photo3.jpeg",
text:"Happy Women’s Day! Relax, take a chill pill, and remember you’re already a queen. 👑😌"
},

{
img:"Images/photo4.jpeg",
text:"Happy Women’s Day to my sleeping beauty, strong, and crazy bestie. The world is better because of women like you. 🌸"
},

{
img:"Images/photo5.jpeg",
text:"bss bss jayda hassoo mt 😂🤭"
}

]

let index=0

function start(){

document.getElementById("startPage").style.display="none"
document.getElementById("slidePage").style.display="block"

}

function nextSlide(){

index++

if(index>=slides.length){

document.querySelector(".card").innerHTML=`

<h2 style="color:#ff4d6d">Happy Women's Day ❤️</h2>

<p style="font-size:20px">
You are the most amazing woman in my life.  
Thank you for being my happiness. 💖
</p>

`

return

}

document.getElementById("slideImg").src=slides[index].img
document.getElementById("slideText").innerText=slides[index].text

}

</script>

</body>
</html>
