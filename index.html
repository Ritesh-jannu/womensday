<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Women's Day ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ff758f,#ff7eb3);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
color:white;
}

/* LANDING PAGE */

.start{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.start h1{
font-size:clamp(32px,6vw,48px);
}

.start p{
font-size:18px;
max-width:400px;
opacity:.9;
}

.start button{
padding:14px 32px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.start button:hover{
transform:scale(1.1);
}

/* SLIDES */

.container{
display:none;
width:100%;
max-width:420px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
color:#333;
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

.card img{
width:100%;
height:320px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
}

.message{
font-size:18px;
line-height:1.5;
margin-bottom:20px;
}

/* BUTTON */

.nextBtn{
padding:12px 28px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.nextBtn:hover{
transform:scale(1.08);
}

/* FINAL */

.final{
font-size:22px;
line-height:1.6;
padding:20px;
}

</style>

</head>



<body>

<!-- START PAGE -->

<div class="start" id="startPage">

<h1>Happy Women's Day 💐</h1>

<p>
Today is for celebrating the strength, beauty and kindness
of the most special woman in my life.
</p>

<button onclick="start()">Open Your Surprise ❤️</button>

</div>



<!-- SLIDE PAGE -->

<div class="container" id="slidePage">

<div class="card">

<img id="slideImg" src="Images/photo1.jpeg">

<p class="message" id="slideText">
You make my world brighter just by being in it ❤️
</p>

<button class="nextBtn" onclick="nextSlide()">
Next Memory →
</button>

</div>

</div>



<script>

const slides=[

{
img:"Images/photo1.jpeg",
text:"Happy Women’s Day! Thanks for proving that women can do anything… including being dramatic for no reason. 😂 "
},

{
img:"Images/photo2.jpeg",
text:"Happy Women’s Day to the girl who gets angry in 2 seconds but also cares the most. 💖😂"
},

{
img:"Images/photo3.jpeg",
text:"Happy Women’s Day! Relax, take a chill pill, and remember you’re already a queen. 👑😌"
},

{
img:"Images/photo4.jpeg",
text:"Happy Women’s Day to my sleeping beauty, strong, and crazy bestie. The world is better because of women like you. 🌸"
},

{
img:"Images/photo5.jpeg",
text:"bss bss jayda hassoo mt😂🤭"
}

]

let index=0

function start(){

document.getElementById("startPage").style.display="none"
document.getElementById("slidePage").style.display="block"

}

function nextSlide(){

index++

if(index>=slides.length){

document.querySelector(".card").innerHTML=`

<h2 style="color:#ff4d6d">Happy Women's Day ❤️</h2>

<p class="final">
You are the most amazing woman in my life.  
Thank you for being my happiness, my support and my love.  
I am lucky to have you every single day. 💖
</p>

`

return

}

document.getElementById("slideImg").src=slides[index].img
document.getElementById("slideText").innerText=slides[index].text

}

</script>

</body>

</html>
